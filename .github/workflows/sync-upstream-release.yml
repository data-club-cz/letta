name: Sync upstream release tags

# Merges new release-tagged commits from letta-ai/letta into our
# data-club-patch branch. Only release tags (X.Y.Z, bare semver) are
# merged — feature work on upstream's main is intentionally skipped
# until tagged. Mirrors the workflow in data-club-cz/letta-code.
#
# Strategy: walk every upstream tag matching N.N.N that we haven't
# merged, in version order; merge each via a fast-forward-or-merge
# into our branch. Conflicts open a PR for human review instead of
# overwriting.

on:
  schedule:
    # Every 6 hours. Upstream releases roughly weekly; the cron is a
    # cheap heartbeat — no notifications until something actually merges.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Specific upstream tag to merge (default: all unmerged release tags)"
        required: false
        type: string
  # Self-registration trigger. GitHub doesn't register schedule-only
  # workflows until their first fire — and `workflow_dispatch` can't be
  # called against an unregistered workflow. Triggering on changes to
  # this file itself makes the workflow appear in the Actions UI on the
  # first push that touches it; it's effectively a no-op for normal
  # development since the file changes rarely.
  push:
    paths:
      - .github/workflows/sync-upstream-release.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data-club-patch
        uses: actions/checkout@v4
        with:
          ref: data-club-patch
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "data-club-sync-bot"
          git config user.email "noreply@data-club.cz"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/letta-ai/letta.git
          # Letta uses bare-semver tags (no `v` prefix). Mirror every
          # upstream tag under `upstream-*` locally so we don't clobber
          # our own tag namespace if we ever cut releases. The next
          # step filters down to semver-shaped tag names. (Refspecs
          # don't support character classes — `[0-9]*` would be parsed
          # literally and fail — so we fetch all tags here.)
          git fetch upstream --tags --no-tags '+refs/tags/*:refs/tags/upstream-*'

      - name: Determine tags to merge
        id: tags
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tags=upstream-${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Collect upstream tags shaped as `upstream-X.Y.Z` in version
          # order, then filter to:
          #   1. NOT already an ancestor of HEAD, AND
          #   2. strictly NEWER (by semver) than the highest tag that IS
          #      an ancestor of HEAD. Letta's history isn't strictly
          #      linear, so an --is-ancestor check alone is too
          #      permissive.
          all=$(git for-each-ref --sort=v:refname --format='%(refname:short)' 'refs/tags/upstream-*' \
                | grep -E '^upstream-[0-9]+\.[0-9]+\.[0-9]+$' || true)
          baseline=""
          for t in $all; do
            if git merge-base --is-ancestor "$t" HEAD 2>/dev/null; then
              baseline="$t"
            fi
          done
          echo "Baseline (highest tag in HEAD's history): ${baseline:-<none>}"
          unmerged=""
          for t in $all; do
            if git merge-base --is-ancestor "$t" HEAD 2>/dev/null; then
              continue
            fi
            if [ -n "$baseline" ]; then
              top=$(printf '%s\n%s\n' "$baseline" "$t" | sort -V | tail -1)
              [ "$top" = "$baseline" ] && continue
            fi
            unmerged="$unmerged $t"
          done
          unmerged_clean=$(echo "$unmerged" | xargs | tr ' ' ',')
          echo "tags=$unmerged_clean" >> "$GITHUB_OUTPUT"

      - name: Merge each unmerged tag
        id: merge
        if: steps.tags.outputs.tags != ''
        env:
          TAG_LIST: ${{ steps.tags.outputs.tags }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IFS=',' read -ra TAGS <<< "$TAG_LIST"
          merged=""
          for tag in "${TAGS[@]}"; do
            upstream_label="${tag#upstream-}"
            echo "::group::Merging $upstream_label"
            if git merge --no-ff -m "chore: sync upstream $upstream_label" "$tag"; then
              echo "Merged $upstream_label cleanly."
              merged="${merged:+$merged, }$upstream_label"
            else
              echo "::error::Conflict merging $upstream_label — opening PR for review."
              branch="sync/upstream-$upstream_label"
              git checkout -B "$branch"
              git add -A
              git commit --no-verify -m "chore: sync upstream $upstream_label (CONFLICTS — resolve before merge)"
              git push origin "$branch" --force
              pr_url=$(gh pr create \
                --base data-club-patch \
                --head "$branch" \
                --title "sync: upstream $upstream_label (conflicts)" \
                --body "Automated merge of upstream tag \`$upstream_label\` produced conflicts. Resolve and merge manually." \
                || gh pr view "$branch" --json url --jq .url \
                || echo "")
              echo "conflict_pr=$pr_url" >> "$GITHUB_OUTPUT"
              echo "conflict_tag=$upstream_label" >> "$GITHUB_OUTPUT"
              [ -n "$merged" ] && echo "merged_tags=$merged" >> "$GITHUB_OUTPUT"
              git checkout data-club-patch -- .
              git checkout data-club-patch
              exit 0
            fi
            echo "::endgroup::"
          done
          [ -n "$merged" ] && echo "merged_tags=$merged" >> "$GITHUB_OUTPUT"

      - name: Push merged commits
        if: steps.merge.outputs.merged_tags != ''
        run: git push origin data-club-patch

      - name: Notify Slack
        if: always() && (steps.tags.outputs.tags != '' || failure())
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          MERGED: ${{ steps.merge.outputs.merged_tags }}
          CONFLICT_PR: ${{ steps.merge.outputs.conflict_pr }}
          CONFLICT_TAG: ${{ steps.merge.outputs.conflict_tag }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification."
            exit 0
          fi
          if [ -n "$CONFLICT_TAG" ]; then
            if [ -n "$CONFLICT_PR" ]; then
              msg=":warning: letta server sync hit a conflict on \`$CONFLICT_TAG\` — review <$CONFLICT_PR|the PR>."
            else
              msg=":warning: letta server sync hit a conflict on \`$CONFLICT_TAG\` — PR auto-open failed, see <$RUN_URL|run logs>."
            fi
            if [ -n "$MERGED" ]; then
              msg="$msg (Cleanly merged before the conflict: $MERGED.)"
            fi
          elif [ "$JOB_STATUS" = "failure" ] || [ "$JOB_STATUS" = "cancelled" ]; then
            msg=":x: letta server sync workflow $JOB_STATUS — <$RUN_URL|logs>."
          elif [ -n "$MERGED" ]; then
            msg=":white_check_mark: letta server synced upstream into \`data-club-patch\`: $MERGED."
          else
            exit 0
          fi
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "$(jq -nc --arg t "$msg" '{text:$t}')" "$WEBHOOK"
